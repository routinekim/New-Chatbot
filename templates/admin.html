{% extends "base.html" %}

{% block title %}관리자 — 규정 문서 등록{% endblock %}

{% block head %}
<style>
  .form-row { margin-bottom: 18px; }
  .form-inline { display: flex; gap: 14px; }
  .form-inline .form-row { flex: 1; }

  textarea#content {
    min-height: 340px;
    resize: vertical;
    font-size: 0.95rem;
    line-height: 1.7;
  }

  .char-count { font-size: 0.78rem; color: #999; margin-top: 4px; text-align: right; }

  .btn-row { display: flex; align-items: center; gap: 14px; margin-top: 6px; }
  #status-msg { font-size: 0.88rem; }

  .doc-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  .doc-table th {
    background: #f0f3fa;
    text-align: left;
    padding: 10px 12px;
    font-weight: 600;
    color: #444;
    border-bottom: 2px solid #dde1ea;
  }
  .doc-table td { padding: 10px 12px; border-bottom: 1px solid #eee; }
  .doc-table tr:hover td { background: #fafbff; }

  .btn-danger {
    background: #c0392b;
    padding: 5px 14px;
    font-size: 0.82rem;
  }
  .btn-danger:hover { background: #a93226; }

  .empty-msg { text-align: center; color: #aaa; padding: 28px 0; font-size: 0.9rem; }

  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: white;
    border-radius: 10px;
    width: 90%;
    max-width: 700px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .modal-header {
    padding: 18px 24px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 { font-size: 1rem; }
  .modal-close { background: none; border: none; font-size: 1.4rem; color: #888; cursor: pointer; padding: 0 4px; }
  .modal-body { padding: 20px 24px; overflow-y: auto; }
  .chunk-item {
    background: #f7f8fc;
    border-left: 3px solid #1a3a6b;
    border-radius: 0 6px 6px 0;
    padding: 12px 14px;
    margin-bottom: 12px;
    font-size: 0.88rem;
    line-height: 1.7;
    white-space: pre-wrap;
  }
  .chunk-num { font-size: 0.75rem; color: #999; margin-bottom: 6px; }

  #convert-badge {
    display: none;
    font-size: 0.75rem;
    color: #1a6b3a;
    background: #e8f5e9;
    border: 1px solid #c8e6c9;
    border-radius: 4px;
    padding: 3px 8px;
  }
  #cleanup-btn {
    display: none;
    padding: 4px 14px;
    font-size: 0.82rem;
    background: #4a6fa5;
  }
  #cleanup-btn:disabled { opacity: 0.6; cursor: default; }
</style>
<script src="/static/turndown.js"></script>
<script src="/static/turndown-plugin-gfm.js"></script>
{% endblock %}

{% block content %}
<div class="card">
  <h2 style="font-size:1.15rem; margin-bottom:20px;">규정 문서 등록</h2>

  <div class="form-inline">
    <div class="form-row">
      <label for="title">문서명</label>
      <input type="text" id="title" placeholder="예) 2025 학생생활규정" />
    </div>
    <div class="form-row">
      <label for="department">담당 부서</label>
      <select id="department">
        {% for dept in departments %}
        <option value="{{ dept }}">{{ dept }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="form-row">
    <label for="content">규정 내용 <span style="font-weight:400;color:#888">(텍스트를 복사해서 붙여넣으세요)</span></label>
    <textarea id="content" placeholder="규정 원문을 여기에 붙여넣으세요...&#10;&#10;예)&#10;제1조 (목적) 이 규정은 한세대학교 학생의..."></textarea>
    <div class="char-count"><span id="char-count">0</span>자</div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:6px;">
      <span id="convert-badge">✓ 표 구조 자동 변환됨</span>
      <button id="cleanup-btn" onclick="cleanupTable()">정리하기</button>
      <span id="cleanup-status" style="font-size:0.82rem;color:#888;"></span>
    </div>
  </div>

  <div class="btn-row">
    <button onclick="submitDocument()">등록 및 인덱싱</button>
    <span id="status-msg"></span>
  </div>
</div>

<div class="card">
  <h2 style="font-size:1.1rem; margin-bottom:16px;">등록된 문서 목록</h2>
  <table class="doc-table" id="doc-table">
    <thead>
      <tr>
        <th>문서명</th>
        <th>부서</th>
        <th>청크 수</th>
        <th>등록일</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="doc-list">
      <tr><td colspan="5" class="empty-msg">등록된 문서가 없습니다.</td></tr>
    </tbody>
  </table>
</div>

<div class="modal-backdrop" id="chunk-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="document.getElementById('chunk-modal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  const turndownService = new TurndownService({ headingStyle: 'atx', bulletListMarker: '-' });
  turndownService.use(turndownPluginGfm.gfm);

  const contentEl = document.getElementById('content');

  contentEl.addEventListener('input', function () {
    document.getElementById('char-count').textContent = this.value.length.toLocaleString();
    if (!this.value.includes('|')) {
      document.getElementById('convert-badge').style.display = 'none';
      document.getElementById('cleanup-btn').style.display = 'none';
    }
  });

  function tableNodeToMarkdown(table) {
    const rows = Array.from(table.querySelectorAll('tr'));
    if (!rows.length) return '';
    return rows.map((row, i) => {
      const cells = Array.from(row.querySelectorAll('td, th'));
      const line = '| ' + cells.map(c =>
        c.textContent.trim().replace(/\s+/g, ' ').replace(/\|/g, '\\|')
      ).join(' | ') + ' |';
      if (i === 0) {
        return line + '\n| ' + Array(cells.length).fill('---').join(' | ') + ' |';
      }
      return line;
    }).join('\n');
  }

  function convertHtmlToMarkdown(htmlStr) {
    const div = document.createElement('div');
    div.innerHTML = htmlStr;
    const tables = Array.from(div.querySelectorAll('table'));
    if (!tables.length) return turndownService.turndown(htmlStr);

    // 각 표를 placeholder로 교체 후 Turndown으로 텍스트 변환, 그 다음 표 복원
    const tableMds = tables.map((table, i) => {
      const span = document.createElement('span');
      span.textContent = `XXTABLE${i}PLACEHOLDER`;
      table.parentNode.replaceChild(span, table);
      return tableNodeToMarkdown(table);
    });

    let md = turndownService.turndown(div.innerHTML);
    tableMds.forEach((tableMd, i) => {
      md = md.replace(`XXTABLE${i}PLACEHOLDER`, '\n\n' + tableMd + '\n\n');
    });
    return md.trim();
  }

  contentEl.addEventListener('paste', function (e) {
    const html = e.clipboardData.getData('text/html');
    const plain = e.clipboardData.getData('text/plain');
    // HWP는 text/plain에 HTML 코드를 그대로 넣기도 함 — 두 경우 모두 처리
    const src = (html && html.toLowerCase().includes('<table')) ? html
              : (plain && plain.toLowerCase().includes('<table')) ? plain
              : null;
    if (!src) return;

    e.preventDefault();
    const md = convertHtmlToMarkdown(src);
    const start = this.selectionStart;
    const end = this.selectionEnd;
    this.value = this.value.substring(0, start) + md + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + md.length;

    document.getElementById('char-count').textContent = this.value.length.toLocaleString();
    document.getElementById('convert-badge').style.display = '';
    document.getElementById('cleanup-btn').style.display = '';
  });

  async function cleanupTable() {
    const content = contentEl.value.trim();
    if (!content) return;

    const btn = document.getElementById('cleanup-btn');
    const statusEl = document.getElementById('cleanup-status');
    btn.disabled = true;
    statusEl.textContent = '정리 중...';

    try {
      const res = await fetch('/admin/cleanup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content }),
      });
      if (!res.ok) { statusEl.textContent = '오류가 발생했습니다.'; return; }
      const data = await res.json();
      contentEl.value = data.content;
      document.getElementById('char-count').textContent = data.content.length.toLocaleString();
      statusEl.textContent = '정리 완료';
      setTimeout(() => { statusEl.textContent = ''; }, 3000);
    } catch {
      statusEl.textContent = '오류가 발생했습니다.';
    } finally {
      btn.disabled = false;
    }
  }

  async function submitDocument() {
    const title = document.getElementById('title').value.trim();
    const department = document.getElementById('department').value;
    const content = document.getElementById('content').value.trim();
    const statusEl = document.getElementById('status-msg');

    if (!title) { statusEl.className = 'msg-error'; statusEl.textContent = '문서명을 입력해주세요.'; return; }
    if (!content) { statusEl.className = 'msg-error'; statusEl.textContent = '규정 내용을 입력해주세요.'; return; }

    statusEl.className = ''; statusEl.textContent = '인덱싱 중...';

    try {
      const res = await fetch('/admin/ingest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, department, content }),
      });

      if (res.status === 401) {
        statusEl.className = 'msg-error'; statusEl.textContent = '인증 실패. 페이지를 새로고침 후 다시 로그인하세요.';
        return;
      }

      const data = await res.json();
      statusEl.className = 'msg-success';
      statusEl.textContent = `완료 — ${data.chunk_count}개 청크로 인덱싱되었습니다.`;

      document.getElementById('title').value = '';
      document.getElementById('content').value = '';
      document.getElementById('char-count').textContent = '0';

      loadDocuments();
    } catch (e) {
      statusEl.className = 'msg-error'; statusEl.textContent = '오류가 발생했습니다.';
    }
  }

  async function loadDocuments() {
    try {
      const res = await fetch('/admin/documents');
      const data = await res.json();
      const tbody = document.getElementById('doc-list');

      if (!data.documents || data.documents.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">등록된 문서가 없습니다.</td></tr>';
        return;
      }

      tbody.innerHTML = data.documents.map(doc => `
        <tr>
          <td>${doc.title}</td>
          <td><span class="tag">${doc.department}</span></td>
          <td>${doc.chunk_count}</td>
          <td>${doc.created_at ?? '-'}</td>
          <td style="display:flex;gap:6px">
            <button onclick="viewChunks('${doc.id}', '${doc.title}')">보기</button>
            <button class="btn-danger" onclick="deleteDocument('${doc.id}')">삭제</button>
          </td>
        </tr>
      `).join('');
    } catch (e) {}
  }

  async function deleteDocument(id) {
    if (!confirm('이 문서를 삭제하면 관련 청크가 모두 제거됩니다. 계속할까요?')) return;
    await fetch(`/admin/documents/${id}`, { method: 'DELETE' });
    loadDocuments();
  }

  loadDocuments();

  async function viewChunks(docId, title) {
    document.getElementById('modal-title').textContent = title + ' — 청크 목록';
    document.getElementById('modal-body').innerHTML = '<p style="color:#aaa">불러오는 중...</p>';
    document.getElementById('chunk-modal').classList.add('open');

    const res = await fetch(`/admin/documents/${docId}/chunks`);
    const data = await res.json();
    const body = document.getElementById('modal-body');
    if (!data.chunks || data.chunks.length === 0) {
      body.innerHTML = '<p class="empty-msg">청크가 없습니다.</p>';
      return;
    }
    body.innerHTML = data.chunks.map((c, i) => `
      <div class="chunk-item">
        <div class="chunk-num">청크 ${i + 1} / ${data.chunks.length}</div>
        ${c}
      </div>
    `).join('');
  }

  document.getElementById('chunk-modal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
</script>
{% endblock %}
