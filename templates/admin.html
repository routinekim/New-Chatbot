{% extends "base.html" %}

{% block title %}관리자 — 규정 문서 등록{% endblock %}

{% block head %}
<style>
  /* 폼 레이아웃 */
  .form-row { margin-bottom: 16px; }
  .form-inline { display: flex; gap: 16px; }
  .form-inline .form-row { flex: 1; }

  textarea#content {
    min-height: 320px;
    resize: vertical;
    font-size: 13px;
    line-height: 1.8;
  }
  .char-count {
    font-size: 11px;
    color: #999;
    text-align: right;
    margin-top: 4px;
  }

  /* 버튼 행 */
  .btn-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-top: 6px;
    border-top: 1px solid var(--border-light);
    margin-top: 16px;
  }
  #status-msg { font-size: 13px; }

  /* 변환 배지 */
  .convert-badge {
    display: none;
    font-size: 11px;
    font-weight: 700;
    color: var(--success);
    background: #e8f5ed;
    border: 1px solid #b0d8bc;
    border-radius: 2px;
    padding: 3px 10px;
  }
  #cleanup-btn {
    display: none;
    font-size: 12px;
  }
  .paste-hint-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
    min-height: 26px;
  }
  #cleanup-status { font-size: 12px; color: var(--text-sub); }

  /* 문서 목록 테이블 */
  .doc-actions { display: flex; gap: 6px; justify-content: center; }

  /* 모달 */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: white;
    border: 1px solid var(--border);
    width: 92%;
    max-width: 720px;
    max-height: 82vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .modal-header {
    background: var(--bg-table-head);
    border-bottom: 2px solid var(--primary);
    padding: 13px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--primary);
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 18px;
    color: #888;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .modal-close:hover { color: var(--error); }
  .modal-body {
    padding: 18px 20px;
    overflow-y: auto;
  }

  /* 청크 뷰어 */
  .chunk-item {
    border: 1px solid var(--border-light);
    border-left: 3px solid var(--primary);
    background: #fafbff;
    padding: 12px 14px;
    margin-bottom: 10px;
    font-size: 12px;
    line-height: 1.8;
    white-space: pre-wrap;
  }
  .chunk-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-sub);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
</style>
<script src="/static/turndown.js"></script>
<script src="/static/turndown-plugin-gfm.js"></script>
{% endblock %}

{% block content %}

<div class="page-title-bar">
  <h2>관리자</h2>
  <p>규정 문서를 등록하고 인덱싱 현황을 관리합니다.</p>
</div>

<!-- 문서 등록 -->
<div class="section-box">
  <div class="section-head">규정 문서 등록</div>
  <div class="section-body">

    <div class="form-row">
      <label for="doc-type">문서 종류</label>
      <select id="doc-type">
        <option value="">선택 안 함</option>
        <option value="규정">규정</option>
        <option value="지침">지침</option>
        <option value="업무매뉴얼">업무매뉴얼</option>
        <option value="결재공문/기안문">결재공문/기안문</option>
        <option value="계획서/결과보고서">계획서/결과보고서</option>
        <option value="회의록">회의록</option>
      </select>
    </div>

    <div class="form-row">
      <label for="title">문서명 <span class="required">*</span></label>
      <input type="text" id="title" placeholder="예) 2025 학생생활규정" />
    </div>

    <div class="form-row">
      <label for="content">규정 내용 <span class="required">*</span>
        <span style="font-weight:400; color:#888; font-size:12px; margin-left:6px;">텍스트를 복사하여 붙여넣으세요. HTML 표는 자동 변환됩니다.</span>
      </label>
      <textarea id="content" placeholder="규정 원문을 여기에 붙여넣으세요...&#10;&#10;예)&#10;제1조 (목적) 이 규정은 한세대학교 학생의..."></textarea>
      <div class="char-count"><span id="char-count">0</span>자</div>
      <div class="paste-hint-row">
        <span class="convert-badge" id="convert-badge">&#10003; 표 구조 자동 변환됨</span>
        <button class="btn btn-secondary btn-sm" id="cleanup-btn" onclick="cleanupTable()">정리하기</button>
        <span id="cleanup-status"></span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="submitDocument()">등록 및 인덱싱</button>
      <span id="status-msg"></span>
    </div>

  </div>
</div>

<!-- 등록 문서 목록 -->
<div class="section-box">
  <div class="section-head">등록된 문서 목록</div>
  <div class="section-body" style="padding: 0;">
    <table class="gov-table" id="doc-table">
      <thead>
        <tr>
          <th style="width:38%">문서명</th>
          <th style="width:18%">문서 종류</th>
          <th style="width:10%" class="center">청크 수</th>
          <th style="width:20%" class="center">등록일</th>
          <th style="width:14%" class="center">관리</th>
        </tr>
      </thead>
      <tbody id="doc-list">
        <tr class="empty-row"><td colspan="5">등록된 문서가 없습니다.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 청크 뷰어 모달 -->
<div class="modal-backdrop" id="chunk-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="document.getElementById('chunk-modal').classList.remove('open')">&#10005;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  const turndownService = new TurndownService({ headingStyle: 'atx', bulletListMarker: '-' });
  turndownService.use(turndownPluginGfm.gfm);

  const contentEl = document.getElementById('content');

  contentEl.addEventListener('input', function () {
    document.getElementById('char-count').textContent = this.value.length.toLocaleString();
    if (!this.value.includes('|')) {
      document.getElementById('convert-badge').style.display = 'none';
      document.getElementById('cleanup-btn').style.display = 'none';
    }
  });

  function tableNodeToMarkdown(table) {
    const rows = Array.from(table.querySelectorAll('tr'));
    if (!rows.length) return '';
    return rows.map((row, i) => {
      const cells = Array.from(row.querySelectorAll('td, th'));
      const line = '| ' + cells.map(c =>
        c.textContent.trim().replace(/\s+/g, ' ').replace(/\|/g, '\\|')
      ).join(' | ') + ' |';
      if (i === 0) {
        return line + '\n| ' + Array(cells.length).fill('---').join(' | ') + ' |';
      }
      return line;
    }).join('\n');
  }

  function convertHtmlToMarkdown(htmlStr) {
    const div = document.createElement('div');
    div.innerHTML = htmlStr;
    const tables = Array.from(div.querySelectorAll('table'));
    if (!tables.length) return turndownService.turndown(htmlStr);

    const tableMds = tables.map((table, i) => {
      const span = document.createElement('span');
      span.textContent = `XXTABLE${i}PLACEHOLDER`;
      table.parentNode.replaceChild(span, table);
      return tableNodeToMarkdown(table);
    });

    let md = turndownService.turndown(div.innerHTML);
    tableMds.forEach((tableMd, i) => {
      md = md.replace(`XXTABLE${i}PLACEHOLDER`, '\n\n' + tableMd + '\n\n');
    });
    return md.trim();
  }

  contentEl.addEventListener('paste', function (e) {
    const html = e.clipboardData.getData('text/html');
    const plain = e.clipboardData.getData('text/plain');
    const src = (html && html.toLowerCase().includes('<table')) ? html
              : (plain && plain.toLowerCase().includes('<table')) ? plain
              : null;
    if (!src) return;

    e.preventDefault();
    const md = convertHtmlToMarkdown(src);
    const start = this.selectionStart;
    const end = this.selectionEnd;
    this.value = this.value.substring(0, start) + md + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + md.length;

    document.getElementById('char-count').textContent = this.value.length.toLocaleString();
    document.getElementById('convert-badge').style.display = '';
    document.getElementById('cleanup-btn').style.display = '';
  });

  async function cleanupTable() {
    const content = contentEl.value.trim();
    if (!content) return;

    const btn = document.getElementById('cleanup-btn');
    const statusEl = document.getElementById('cleanup-status');
    btn.disabled = true;
    statusEl.textContent = '정리 중...';

    try {
      const res = await fetch('/admin/cleanup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content }),
      });
      if (!res.ok) { statusEl.textContent = '오류가 발생했습니다.'; return; }
      const data = await res.json();
      contentEl.value = data.content;
      document.getElementById('char-count').textContent = data.content.length.toLocaleString();
      statusEl.textContent = '정리 완료';
      setTimeout(() => { statusEl.textContent = ''; }, 3000);
    } catch {
      statusEl.textContent = '오류가 발생했습니다.';
    } finally {
      btn.disabled = false;
    }
  }

  async function submitDocument() {
    const title = document.getElementById('title').value.trim();
    const docType = document.getElementById('doc-type').value || null;
    const content = contentEl.value.trim();
    const statusEl = document.getElementById('status-msg');

    if (!title) {
      statusEl.className = 'msg-error';
      statusEl.textContent = '문서명을 입력해주세요.';
      return;
    }
    if (!content) {
      statusEl.className = 'msg-error';
      statusEl.textContent = '규정 내용을 입력해주세요.';
      return;
    }

    statusEl.className = 'msg-info';
    statusEl.textContent = '인덱싱 중...';

    try {
      const res = await fetch('/admin/ingest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content, doc_type: docType }),
      });

      if (res.status === 401) {
        statusEl.className = 'msg-error';
        statusEl.textContent = '인증 실패. 페이지를 새로고침 후 다시 로그인하세요.';
        return;
      }

      const data = await res.json();
      statusEl.className = 'msg-success';
      statusEl.textContent = `등록 완료 — ${data.chunk_count}개 청크로 인덱싱되었습니다.`;

      document.getElementById('title').value = '';
      document.getElementById('doc-type').value = '';
      contentEl.value = '';
      document.getElementById('char-count').textContent = '0';
      document.getElementById('convert-badge').style.display = 'none';
      document.getElementById('cleanup-btn').style.display = 'none';

      loadDocuments();
    } catch (e) {
      statusEl.className = 'msg-error';
      statusEl.textContent = '오류가 발생했습니다.';
    }
  }

  async function loadDocuments() {
    try {
      const res = await fetch('/admin/documents');
      const data = await res.json();
      const tbody = document.getElementById('doc-list');

      if (!data.documents || data.documents.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="5">등록된 문서가 없습니다.</td></tr>';
        return;
      }

      tbody.innerHTML = data.documents.map(doc => `
        <tr>
          <td>${doc.title}</td>
          <td>${doc.doc_type ? `<span class="tag">${doc.doc_type}</span>` : '-'}</td>
          <td class="center">${doc.chunk_count}</td>
          <td class="center">${doc.created_at ?? '-'}</td>
          <td class="center">
            <div class="doc-actions">
              <button class="btn btn-secondary btn-sm" onclick="viewChunks('${doc.id}', '${doc.title}')">청크 보기</button>
              <button class="btn btn-danger btn-sm" onclick="deleteDocument('${doc.id}')">삭제</button>
            </div>
          </td>
        </tr>
      `).join('');
    } catch (e) {}
  }

  async function deleteDocument(id) {
    if (!confirm('이 문서를 삭제하면 관련 청크가 모두 제거됩니다. 계속할까요?')) return;
    await fetch(`/admin/documents/${id}`, { method: 'DELETE' });
    loadDocuments();
  }

  async function viewChunks(docId, title) {
    document.getElementById('modal-title').textContent = title + ' — 청크 목록';
    document.getElementById('modal-body').innerHTML = '<p style="color:#aaa;font-size:13px;">불러오는 중...</p>';
    document.getElementById('chunk-modal').classList.add('open');

    const res = await fetch(`/admin/documents/${docId}/chunks`);
    const data = await res.json();
    const body = document.getElementById('modal-body');
    if (!data.chunks || data.chunks.length === 0) {
      body.innerHTML = '<p class="empty-row" style="text-align:center;color:#aaa;padding:24px 0;font-size:13px;">청크가 없습니다.</p>';
      return;
    }
    body.innerHTML = data.chunks.map((c, i) => `
      <div class="chunk-item">
        <div class="chunk-num">청크 ${i + 1} / ${data.chunks.length}</div>${c}
      </div>
    `).join('');
  }

  document.getElementById('chunk-modal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });

  loadDocuments();
</script>
{% endblock %}
